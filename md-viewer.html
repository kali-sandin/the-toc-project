<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visor Markdown — The TOC Project</title>
  <link rel="stylesheet" href="md-viewer.css">
</head>
<body>
  <main class="viewer-shell">
    <header class="viewer-header">
      <a class="viewer-back" href="index.html#evidence">← volver al caos útil</a>
      <p class="viewer-kicker">visor markdown legible</p>
      <h1 id="viewer-title">Cargando documento…</h1>
      <p id="viewer-subtitle" class="viewer-subtitle">Esta zona no participa en el sabotaje visual. Bastante castigo hay ya en la home.</p>
    </header>

    <nav id="viewer-doc-nav" class="viewer-doc-nav" aria-label="Documentos research"></nav>

    <section class="viewer-meta" aria-label="Metadatos del documento">
      <span id="viewer-path" class="viewer-chip">ruta pendiente</span>
      <span class="viewer-chip">modo lectura</span>
      <span class="viewer-chip">sin TOC inducido</span>
    </section>

    <article id="viewer-content" class="viewer-content" aria-live="polite">
      <p>Cargando contenido…</p>
    </article>
  </main>
  <script src="md-viewer.js"></script>
</body>
</html>
